.label{letter-spacing:3px;text-transform:uppercase;font-size:9px;color:#a89478;font-family:'zpix',monospace}
.footer{text-align:center;letter-spacing:3px;text-transform:uppercase;font-size:9px;color:#a89478;padding:16px 0}

.nav-btn{background:none;border:none;font-family:'zpix',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;padding:4px 0}

.btn{padding:8px 16px;border:2px solid #3d2e1f;background:#faf5e8;color:#3d2e1f;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'zpix',monospace;cursor:pointer;box-shadow:2px 2px 0 #d4c4a8}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #d4c4a8}
.btn-dk{padding:8px 16px;border:2px solid #3d2818;background:#3d2818;color:#f4ede0;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'zpix',monospace;cursor:pointer;box-shadow:3px 3px 0 #a89478}

.input{width:100%;padding:8px 10px;border:2px solid #d4c4a8;background:#faf5e8;color:#3d2e1f;font-family:'zpix',monospace;font-size:12px;outline:none}
.input::placeholder{color:#a89478}

.ann-input{padding:8px 10px;border:2px solid #d4c4a8;background:#faf5e8;color:#3d2e1f;font-family:'zpix',monospace;font-size:12px;outline:none}
.ann-input::placeholder{color:#a89478}
.ann-input:disabled{background:#f0e8d8}

.ann-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#f4ede0;border-top:2px solid #d4c4a8;padding:10px 16px 14px}
.ann-card{padding:14px 16px;background:rgba(235,224,200,0.35);border-left:3px solid #b86840;margin-bottom:8px}

.hl-text{border-bottom:2px solid #b86840;background:rgba(184,104,64,0.12);padding-bottom:1px}

.clear-btn{background:none;border:none;color:#a89478;font-family:'zpix',monospace;font-size:9px;cursor:pointer;margin-left:6px}

.log-card{display:flex;margin-bottom:8px;border:2px solid #d4c4a8;background:#faf5e8;cursor:pointer;box-shadow:3px 3px 0 #d4c4a8;transition:transform .1s}

.dow-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;padding:3px;position:relative;overflow:hidden;transition:transform .1s}
.cal-filled{border:2px solid #d4c4a8;background:#faf5e8;cursor:pointer}
.cal-empty{border:2px dashed #d4c4a8;background:transparent}

.err-box{margin-top:12px;padding:10px;background:rgba(184,104,64,0.15);border:2px solid #b86840;color:#3d2e1f;font-size:11px;line-height:1.6;word-break:break-all}
