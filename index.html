/* ═══ Theme Variables ═══ */
:root, .theme-fruit {
  --bg:#f5f3f0;
  --surface:#fcfbf9;
  --text:#3d3a37;
  --text-dim:#7b7670;
  --text-muted:#9b9690;
  --accent:#c8a090;
  --accent-rgb:200,160,144;
  --border:#e8e4de;
  --border-light:#e0dbd4;
  --border-solid:#d0cbc4;
  --btn-bg:#fcfbf9;
  --btn-hover-bg:#f5f3f0;
  --btn-hover-border:#b8b0a8;
  --error:#c87070;
  --input-bg:#fcfbf9;
  --placeholder:#bfbab4;
  --disabled-bg:#f0ede9;
  --scrollbar-track:#f5f3f0;
  --scrollbar-thumb:#d4cec6;
  --dk-btn-bg:#3d3a37;
  --dk-btn-hover:#4a4642;
  --dk-btn-text:#f5f3f0;
  --shadow-sm:rgba(0,0,0,0.03);
  --shadow-md:rgba(0,0,0,0.04);
  --clear-hover:#6b6560;
  --body-font:'Nunito',sans-serif;
  --accent-font:'Nunito',sans-serif;
}
.theme-medieval {
  --bg:#efe0c4;
  --surface:#faf3e4;
  --text:#3d2a1a;
  --text-dim:#7a5a3a;
  --text-muted:#a08060;
  --accent:#b8860b;
  --accent-rgb:184,134,11;
  --border:#d4c0a0;
  --border-light:#e0d0b8;
  --border-solid:#c4a882;
  --btn-bg:#faf3e4;
  --btn-hover-bg:#efe0c4;
  --btn-hover-border:#b8860b;
  --error:#a04040;
  --input-bg:#faf3e4;
  --placeholder:#c0a888;
  --disabled-bg:#e8d8c0;
  --scrollbar-track:#efe0c4;
  --scrollbar-thumb:#c4a882;
  --dk-btn-bg:#b8860b;
  --dk-btn-hover:#a07008;
  --dk-btn-text:#faf3e4;
  --shadow-sm:rgba(139,100,43,0.08);
  --shadow-md:rgba(139,100,43,0.12);
  --clear-hover:#b8860b;
  --body-font:'Cinzel','Nunito',serif;
  --accent-font:'Cinzel',serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:var(--bg);font-family:var(--body-font);color:var(--text);-webkit-tap-highlight-color:transparent}
::selection{background:rgba(var(--accent-rgb),0.18)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb)}

.shell{min-height:100vh;position:relative}
.dot-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.theme-fruit .dot-bg{background-image:radial-gradient(circle at 20% 30%,rgba(240,192,160,0.18) 2px,transparent 2px),radial-gradient(circle at 50% 70%,rgba(240,192,160,0.12) 3px,transparent 3px),radial-gradient(circle at 80% 20%,rgba(152,200,136,0.1) 2px,transparent 2px),radial-gradient(circle at 35% 85%,rgba(240,192,160,0.1) 4px,transparent 4px),radial-gradient(circle at 65% 50%,rgba(152,200,136,0.1) 1.5px,transparent 1.5px);background-size:100px 100px}
.theme-medieval .dot-bg{background-image:radial-gradient(circle at 10% 15%,rgba(184,134,11,0.1) 2px,transparent 2px),radial-gradient(circle at 40% 45%,rgba(184,134,11,0.07) 3px,transparent 3px),radial-gradient(circle at 70% 25%,rgba(184,134,11,0.09) 2px,transparent 2px),radial-gradient(circle at 25% 70%,rgba(139,100,43,0.06) 4px,transparent 4px),radial-gradient(circle at 55% 80%,rgba(184,134,11,0.05) 2.5px,transparent 2.5px),radial-gradient(circle at 85% 55%,rgba(139,100,43,0.07) 2px,transparent 2px),repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(184,134,11,0.06) 38px,rgba(184,134,11,0.06) 39px),radial-gradient(circle at 35% 88%,rgba(61,42,26,0.04) 1.5px,transparent 1.5px),radial-gradient(circle at 75% 40%,rgba(61,42,26,0.03) 2px,transparent 2px);background-size:120px 120px,120px 120px,120px 120px,120px 120px,120px 120px,120px 120px,100% 78px,180px 180px,180px 180px}

.label{letter-spacing:3px;text-transform:uppercase;font-size:9px;color:var(--text-muted);font-family:var(--body-font)}
.footer{text-align:center;letter-spacing:3px;text-transform:uppercase;font-size:9px;color:var(--text-muted);padding:16px 0}

.nav-btn{background:none;border:none;font-family:var(--accent-font);font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;padding:4px 0;transition:color .2s;color:var(--text-muted)}
.nav-btn:hover{color:var(--text)}

.btn{padding:8px 16px;border:1.5px solid var(--border-solid);background:var(--btn-bg);color:var(--text);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-family:var(--body-font);cursor:pointer;border-radius:8px;transition:all .2s;font-weight:600}
.btn:hover{background:var(--btn-hover-bg);border-color:var(--btn-hover-border)}
.btn:active{transform:scale(.97)}
.btn-dk{padding:8px 16px;border:1.5px solid var(--dk-btn-bg);background:var(--dk-btn-bg);color:var(--dk-btn-text);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-family:var(--body-font);cursor:pointer;border-radius:8px;transition:all .2s;font-weight:600}
.btn-dk:hover{background:var(--dk-btn-hover);border-color:var(--dk-btn-hover)}
.btn-dk:active{transform:scale(.97)}

.input{width:100%;padding:10px 12px;border:1.5px solid var(--border-light);background:var(--input-bg);color:var(--text);font-family:var(--body-font);font-size:12px;outline:none;border-radius:8px;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--placeholder)}

.ann-input{padding:10px 12px;border:1.5px solid var(--border-light);background:var(--input-bg);color:var(--text);font-family:var(--body-font);font-size:12px;outline:none;border-radius:8px;transition:border-color .2s}
.ann-input:focus{border-color:var(--accent)}
.ann-input::placeholder{color:var(--placeholder)}
.ann-input:disabled{background:var(--disabled-bg)}

.ann-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg);border-top:1.5px solid var(--border);padding:12px 16px 16px}
.ann-card{padding:14px 16px;background:rgba(var(--accent-rgb),0.06);border-left:2.5px solid var(--accent);border-radius:8px;margin-bottom:8px}

.hl-text{border-bottom:2px solid var(--accent);background:rgba(var(--accent-rgb),0.12);padding-bottom:1px;border-radius:4px;cursor:pointer;transition:background .15s}
.hl-text:hover{background:rgba(var(--accent-rgb),0.2)}

.ann-popup-overlay{position:fixed;inset:0;z-index:99}

.ann-popup{position:fixed;z-index:100;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.14);padding:16px;max-width:320px;min-width:220px}
.ann-popup-below::before{content:'';position:absolute;width:10px;height:10px;background:var(--surface);border-left:1.5px solid var(--border);border-top:1.5px solid var(--border);transform:rotate(45deg);top:-6px;left:20px}
.ann-popup-above::before{content:'';position:absolute;width:10px;height:10px;background:var(--surface);border-right:1.5px solid var(--border);border-bottom:1.5px solid var(--border);transform:rotate(45deg);bottom:-6px;left:20px}

@keyframes popupIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popupInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.clear-btn{background:none;border:none;color:var(--text-muted);font-family:var(--body-font);font-size:9px;cursor:pointer;margin-left:6px;transition:color .2s}
.clear-btn:hover{color:var(--clear-hover)}

.log-card{display:flex;margin-bottom:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;border-radius:10px;transition:transform .15s,box-shadow .15s;overflow:hidden}
.log-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px var(--shadow-md)}

.dow-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;padding:3px;position:relative;overflow:hidden;transition:transform .15s;border-radius:8px}
.cal-filled{border:1.5px solid var(--border);background:var(--surface);cursor:pointer}
.cal-filled:hover{transform:translateY(-1px);box-shadow:0 2px 8px var(--shadow-sm)}
.cal-empty{border:1.5px dashed var(--border-light);background:transparent}

.err-box{margin-top:12px;padding:10px;background:rgba(var(--accent-rgb),0.12);border:1.5px solid var(--accent);color:var(--text);font-size:11px;line-height:1.6;word-break:break-all;border-radius:8px}

/* Settings */
.settings-btn{position:fixed;top:12px;right:12px;z-index:100;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border-solid);background:var(--surface);color:var(--text-muted);font-family:var(--body-font);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.settings-panel{position:fixed;top:52px;right:12px;z-index:101;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.settings-opt{padding:8px 12px;border-radius:6px;cursor:pointer;font-family:var(--body-font);font-size:12px;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;gap:8px}
.settings-opt:hover{background:rgba(var(--accent-rgb),0.08);color:var(--text)}
.settings-opt.active{background:rgba(var(--accent-rgb),0.12);color:var(--accent);font-weight:700}

.theme-medieval .parchment-card:hover{box-shadow:0 6px 24px rgba(184,134,11,0.15),inset 0 0 40px rgba(184,134,11,0.08),inset 0 0 80px rgba(184,134,11,0.04) !important}

.theme-medieval .parchment-paper::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(184,134,11,0.04) 28px,rgba(184,134,11,0.04) 29px);border-radius:6px;pointer-events:none}

.theme-medieval .ann-input{border-width:2px;background:linear-gradient(160deg,#faf3e4,#f5ebd8) !important;border-color:#c4a882 !important}
.theme-medieval .cal-filled{border-width:2px;background:linear-gradient(160deg,#faf3e4,#f0e4cc) !important}
.theme-medieval .cal-empty{border-width:2px}
.theme-medieval .settings-btn{border-width:2px;background:linear-gradient(160deg,#faf3e4,#f0e4cc) !important}
.theme-medieval .settings-panel{border-width:2px;background:linear-gradient(160deg,#faf3e4,#f0e4cc) !important}
.theme-medieval .log-card:hover{box-shadow:0 4px 20px rgba(184,134,11,0.1),0 1px 4px rgba(139,100,43,0.12),inset 0 0 0 1px rgba(184,134,11,0.25)}

.theme-medieval .footer{letter-spacing:4px;font-size:9px;color:var(--accent)}
